services:
  nginx:
    build:
      context: .
      target: nginx
    ports:
      - "3000:80"
    depends_on:
      trackero:
        condition: service_healthy
    restart: unless-stopped

  trackero:
    build:
      context: .
      target: backend
    expose:
      - "3001"
    env_file: backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
      minio:
        condition: service_started
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: backend
    env_file: backend/.env
    environment:
      DATABASE_USERNAME: trackero_admin
      DATABASE_PASSWORD: trackero_admin_secret
      APP_DB_USER: trackero_app
      APP_DB_PASSWORD: trackero_app_secret
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "./migrate.sh"]
    restart: "no"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trackero_admin
      POSTGRES_PASSWORD: trackero_admin_secret
      POSTGRES_DB: trackero
      APP_DB_PASSWORD: trackero_app_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackero_admin -d trackero"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
